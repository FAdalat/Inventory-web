{% extends "base.html" %}
{% block title %}Log in{% endblock %}

{% block content %}
  <h2>Log in</h2>

  <form method="POST">
    <label>Username
      <input type="text" name="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
{% endblock %}
