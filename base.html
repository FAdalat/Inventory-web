<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Inventory & POS{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1><a href="{{ url_for('products') }}">📦 Inventory & POS</a></h1>
    <nav>
      <a href="{{ url_for('products') }}">Report</a>
      <a href="{{ url_for('add_product') }}">Buy</a>
      <a href="{{ url_for('sell') }}">Sell</a>
      <a href="{{ url_for('sales') }}">Sales</a>
    </nav>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flashes">
          {% for category, message in messages %}
            <li class="flash-{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
